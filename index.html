// ─── CSV NAČÍTÁNÍ ─────────────────────────────────────────────────────────────
function rozsekajCsvRadek(text) {
    var result=[], uvnitr=false, bunka='';
    for (var i=0;i<text.length;i++) {
        var c=text[i];
        if (c==='"') { uvnitr=!uvnitr; }
        else if (c===',' && !uvnitr) { result.push(bunka.trim()); bunka=''; }
        else { bunka+=c; }
    }
    result.push(bunka.trim());
    return result;
}

async function nactiCsvData(typ) {
    try {
        var r = await fetch('assets/data/'+typ+'.csv');
        if (!r.ok) { console.warn('CSV nenalezeno: '+typ); return []; }
        var text = await r.text();
        var radky = text.split(/\r?\n/);
        if (radky.length <= 1) return [];
        var zahlavi = rozsekajCsvRadek(radky[0]);
        var data = [];
        for (var i=1;i<radky.length;i++) {
            if (!radky[i].trim()) continue;
            var bunky = rozsekajCsvRadek(radky[i]);
            var row = {};
            zahlavi.forEach(function(k,idx){ row[k]=bunky[idx]||''; });
            if (!row.soubor) continue;

            // Věk z prvního segmentu před '_' a pak uppercase: "lv1_..." → "LV1"
            var vekKod = row.soubor.split('_')[0].toUpperCase();

            var varianty = [];
            if (row.altCz_colored    && row.altCz_colored    !== '0') varianty.push('colored');
            if (row.altCz_coloring   && row.altCz_coloring   !== '0') varianty.push('coloring');
            if (row.altCz_partly_colored && row.altCz_partly_colored !== '0') varianty.push('partly_colored');

            // Pokud nejsou žádné varianty definované, považuj za coloring (BW)
            if (varianty.length === 0) varianty.push('coloring');

            var vychozi = varianty.includes('colored') ? 'colored' : varianty[0];

            data.push({
                id: typ+'-'+row.soubor,
                souborZaklad: row.soubor,
                typ: typ,
                vek: vekKod,
                nazevCz: row.nazevCz || row.soubor,
                nazevEn: row.nazevEn || row.soubor,
                varianty: varianty,
                vychozi: vychozi,
                alty: {
                    colored:       { cz: row.altCz_colored       || '', en: row.altEn_colored       || '' },
                    coloring:      { cz: row.altCz_coloring      || '', en: row.altEn_coloring      || '' },
                    partly_colored:{ cz: row.altCz_partly_colored|| '', en: row.altEn_partly_colored|| '' }
                }
            });
        }
        return data;
    } catch(e) { console.error('Chyba CSV '+typ, e); return []; }
}

function ziskejCestuBase(polozka, varianta) {
    var zaklad = 'public/'+polozka.typ+'/'+polozka.souborZaklad;
    return polozka.varianty.length === 1 ? zaklad : zaklad+'-'+varianta;
}

// ─── OBRÁZEK HTML ────────────────────────────────────────────────────────────
// Browser si sám vybere webp pokud existuje, jinak png – žádné extra requesty
function obrazekHTML(cestaBase, alt, css, id) {
    var idStr = id ? ' id="'+id+'"' : '';
    // onerror: odstraní <source> aby browser přestal zkoušet webp a zkusil png přímo
    return '<picture class="max-w-full max-h-full flex items-center justify-center">'
        +'<source srcset="'+cestaBase+'.webp" type="image/webp">'
        +'<img'+idStr+' src="'+cestaBase+'.png" alt="'+alt+'" class="'+css+'"'
        +' onerror="var s=this.previousElementSibling;if(s)s.remove();this.src=\''+cestaBase+'.png\'">'
        +'</picture>';
}

// ─── NEJLEPŠÍ URL PRO STAŽENÍ / TISK ─────────────────────────────────────────
// fetch HEAD se volá JEN při kliknutí, ne při načítání gridu
async function nejlepsiUrl(cestaBase) {
    // Zkusí PNG – pokud existuje a má rozumnou velikost (>1KB), použije ho
    // Jinak zkusí webp, jinak vrátí png jako fallback
    try {
        var r = await fetch(cestaBase+'.png', {method:'HEAD'});
        if (r.ok) {
            var velikost = parseInt(r.headers.get('content-length') || '0');
            if (velikost > 1024) return cestaBase+'.png';
        }
    } catch(e) {}
    try {
        var r2 = await fetch(cestaBase+'.webp', {method:'HEAD'});
        if (r2.ok) {
            var velikost2 = parseInt(r2.headers.get('content-length') || '0');
            if (velikost2 > 1024) return cestaBase+'.webp';
        }
    } catch(e) {}
    return cestaBase+'.png'; // fallback
}

function generujBarevnyText(text) {
    var v='', b=0;
    for (var i=0;i<text.length;i++) {
        v += text[i]===' '
            ? '<span class="inline-block">&nbsp;</span>'
            : '<span class="outline-text char-'+(b++%8)+'">'+text[i]+'</span>';
    }
    return v;
}

}

function filtrujData() {
    var q = document.getElementById('search-input').value.toLowerCase().trim();
    var filtered = zparsovanaData.filter(function(p) {
        return (aktualniTyp==='vse' || p.typ===aktualniTyp)
            && (aktualniVek==='vse'  || p.vek===aktualniVek)
            && (q==='' || p.nazevCz.toLowerCase().includes(q) || p.nazevEn.toLowerCase().includes(q));
    });
    vykresliKnihovnu(filtered);

    // Dynamický titulek
    var tituly = {
        cz:{ bludiste:'Dětská bludiště k vytisknutí', omalovanky:'Omalovánky pro děti k vytisknutí',
             spojovacky:'Spojovačky k vytisknutí', vse:'VinMat | Bludiště, omalovánky a aktivity k vytisknutí' },
        en:{ bludiste:'Free Printable Mazes for Kids', omalovanky:'Free Printable Coloring Pages',
             spojovacky:'Free Printable Dot-to-Dot Sheets', vse:'VinMat | Free Printable Mazes, Coloring Pages & More' }
    };
    document.title = tituly[jaz][aktualniTyp] || tituly[jaz].vse;
}

// ─── KARTA VERZE ─────────────────────────────────────────────────────────────
function setKartaVerze(id, verze) {
    var p = zparsovanaData.find(function(x){return x.id===id;});
    if (!p) return;
    aktivniKartyVerze[id] = verze;
    var container = document.getElementById('container-img-'+id);
    if (!container) return;
    var cestaBase = ziskejCestuBase(p, verze);
    var alt = (p.alty[verze]&&p.alty[verze][jaz]) || (jaz==='cz'?p.nazevCz:p.nazevEn);
    container.innerHTML = obrazekHTML(cestaBase, alt, 'max-w-full max-h-full object-contain transition-transform duration-300 group-hover:scale-[1.02]', '');
    p.varianty.forEach(function(v) {
        var btn = document.getElementById('btn-'+v+'-'+id);
        if (btn) btn.className = v===verze
            ? "flex-1 py-1 text-[11px] font-bold rounded-md bg-slate-900 text-white"
            : "flex-1 py-1 text-[11px] font-bold rounded-md text-slate-500 hover:bg-slate-200";
    });
}

// ─── VYKRESLENÍ GRIDU ─────────────────────────────────────────────────────────
var grid     = document.getElementById('knihovna-grid');
var noResults= document.getElementById('no-results');

function vykresliKnihovnu(materialy) {
    grid.innerHTML = '';
    if (materialy.length===0) { noResults.classList.remove('hidden'); return; }
    noResults.classList.add('hidden');

    materialy.forEach(function(p) {
        if (!aktivniKartyVerze[p.id]) aktivniKartyVerze[p.id] = p.vychozi;
        var verze    = aktivniKartyVerze[p.id];
        var cestaBase= ziskejCestuBase(p, verze);
        var nazev    = jaz==='cz' ? p.nazevCz : p.nazevEn;
        var alt      = (p.alty[verze]&&p.alty[verze][jaz]) || nazev;
        var vekText  = vekMapovani[p.vek] ? vekMapovani[p.vek][jaz] : p.vek;

        // Tlačítka pro přepínání variant
        var btns = '';
        if (p.varianty.length > 1) {
            btns = '<div class="flex gap-1 bg-slate-100 p-0.5 rounded-lg">';
            p.varianty.forEach(function(v) {
                btns += '<button id="btn-'+v+'-'+p.id+'" onclick="setKartaVerze(\''+p.id+'\',\''+v+'\')" class="flex-1 py-1 text-[11px] font-bold rounded-md">'
                      + slovnik[jaz][variantaLabel[v]]+'</button>';
            });
            btns += '</div>';
        } else {
            btns = '<div class="text-center bg-slate-100 py-1 rounded-lg text-[11px] font-bold text-slate-500">'+slovnik[jaz].onlyBw+'</div>';
        }

        var karta = document.createElement('div');
        karta.className = "bg-white rounded-2xl overflow-hidden shadow-xs hover:shadow-md transition-all border border-slate-100 flex flex-col";
        karta.innerHTML =
            '<div id="container-img-'+p.id+'" onclick="openModal(\''+p.id+'\')" class="bg-slate-50 aspect-[4/5] p-4 flex items-center justify-center cursor-pointer group">'
                + obrazekHTML(cestaBase, alt, 'max-w-full max-h-full object-contain transition-transform duration-300 group-hover:scale-[1.02]', '')
            +'</div>'
            +'<div class="p-4 flex-grow flex flex-col justify-between border-t border-slate-50">'
                +'<div class="mb-3">'
                    +'<div class="flex justify-between items-center mb-1">'
                        +'<span class="text-[10px] font-bold tracking-wider text-slate-400 uppercase">'+slovnik[jaz][p.typ+'Label']+'</span>'
                        +'<span class="text-xs text-slate-400 font-bold">'+vekText+'</span>'
                    +'</div>'
                    +'<h3 onclick="openModal(\''+p.id+'\')" class="font-bold text-sm text-slate-900 leading-tight cursor-pointer hover:text-indigo-600 line-clamp-2 uppercase">'+nazev+'</h3>'
                +'</div>'
                + btns
            +'</div>';
        grid.appendChild(karta);
        setKartaVerze(p.id, verze);
    });
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(id) {
    var p = zparsovanaData.find(function(x){return x.id===id;});
    if (!p) return;
    aktivniModalPolozka = p;
    aktivniModalVerze   = aktivniKartyVerze[id] || p.vychozi;

    document.getElementById('modal-title').innerText    = jaz==='cz' ? p.nazevCz : p.nazevEn;
    document.getElementById('modal-tag-vek').innerText  = (vekMapovani[p.vek]?vekMapovani[p.vek][jaz]:p.vek).toUpperCase();

    // Tlačítka variant v modalu
    var btnGroup = document.getElementById('modal-buttons-group');
    var container= document.getElementById('modal-version-container');
    btnGroup.innerHTML = '';
    if (p.varianty.length > 1) {
        container.classList.remove('hidden');
        p.varianty.forEach(function(v) {
            btnGroup.innerHTML += '<button id="modal-btn-'+v+'" onclick="toggleModalVersion(\''+v+'\')" class="flex-1 py-2 px-4 rounded-xl font-bold text-sm border-2">'
                + slovnik[jaz][variantaBtn[v]]+'</button>';
        });
    } else {
        container.classList.add('hidden');
    }

    // Tlačítko stažení
    document.getElementById('modal-download-btn').onclick = async function() {
        var btn = document.getElementById('modal-download-btn');
        var orig = btn.innerText;
        btn.innerText = '⏳...';
        var url = await nejlepsiUrl(ziskejCestuBase(p, aktivniModalVerze));
        var ext = url.split('.').pop();
        var a = document.createElement('a');
        a.href = url;
        a.download = p.souborZaklad+'_'+aktivniModalVerze+'.'+ext;
        a.click();
        btn.innerText = orig;
    };

    updateModalDisplay();
    document.getElementById('detail-modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }

function closeModalOnBackdrop(e) {
    if (e.target===document.getElementById('detail-modal')) closeModal();
}

function toggleModalVersion(verze) {
    if (!aktivniModalPolozka) return;
    aktivniModalVerze = verze;
    updateModalDisplay();
    setKartaVerze(aktivniModalPolozka.id, verze);
}

function updateModalDisplay() {
    if (!aktivniModalPolozka) return;
    var p        = aktivniModalPolozka;
    var cestaBase= ziskejCestuBase(p, aktivniModalVerze);
    var alt      = (p.alty[aktivniModalVerze]&&p.alty[aktivniModalVerze][jaz]) || (jaz==='cz'?p.nazevCz:p.nazevEn);

    document.getElementById('modal-img-container').innerHTML =
        obrazekHTML(cestaBase, alt, 'max-w-full max-h-full object-contain rounded-lg', 'modal-nahled-img');

    p.varianty.forEach(function(v) {
        var btn = document.getElementById('modal-btn-'+v);
        if (!btn) return;
        btn.className = v===aktivniModalVerze
            ? "flex-1 py-2 px-4 rounded-xl font-bold text-sm bg-slate-900 text-white border-slate-900 border-2"
            : "flex-1 py-2 px-4 rounded-xl font-bold text-sm bg-slate-50 border-2 border-slate-200 text-slate-600";
    });
}

// ─── TISK ─────────────────────────────────────────────────────────────────────
async function tiskniAktualni() {
    if (!aktivniModalPolozka) return;
    var btn = document.getElementById('print-btn');
    var orig = btn.innerText;
    btn.innerText = '⏳...';

    var cestaBase = ziskejCestuBase(aktivniModalPolozka, aktivniModalVerze);

    // Absolutní URL – nutné pro nové okno (about:blank nezná relativní cesty)
    var origin = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/');
    var nejlepsi = await nejlepsiUrl(cestaBase);
    var tiskUrl = origin + nejlepsi;

    var okno = window.open('', '_blank');
    okno.document.write(
        '<html><head><title>Tisk – VinMat</title>'
        +'<style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;}'
        +'img{max-width:100%;max-height:100vh;object-fit:contain;}</style></head>'
        +'<body><img src="'+tiskUrl+'" onload="window.print();window.close();" onerror="window.close();"></body></html>'
    );
    okno.document.close();
    btn.innerText = orig;
}

// ─── INICIALIZACE ─────────────────────────────────────────────────────────────
async function inicializujAplikaci() {
    try {
        var b = await nactiCsvData('bludiste');
        var o = await nactiCsvData('omalovanky');
        var s = await nactiCsvData('spojovacky');
        zparsovanaData = b.concat(o).concat(s);
        jaz = localStorage.getItem('vinmat_main_lang') || localStorage.getItem('vinmat_lang') || 'cz';
        setJazyk(jaz);
    } catch(e) { console.error('Chyba inicializace:', e); }
}

inicializujAplikaci();
</script>
