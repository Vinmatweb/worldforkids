    <script>
        const slovnik = {
            cz: {

                vse: "Vše", bludiste: "Bludiště", omalovanky: "Omalovánky", spojovacky: "Spojovačky", ageTitle: "Věk:",
                noResults: "Pro tento výběr tu zatím nic nemáme.", variant: "Vyberte variantu listu",
                btnPng: "Stáhnout obrázek", btnPrint: "Vytisknout rovnou", btnColor: "🌈 Barevná", btnBw: "🪙 Černobílá", btnPartly: "🌗 Polovyceněná",
                labelColor: "Barevné", labelBw: "Černobílé", labelPartly: "Částečné",
                bludisteLabel: "BLUDIŠTĚ", omalovankyLabel: "OMALOVÁNKY", spojovackyLabel: "SPOJOVAČKY",
                footerCopyright: "© 2026 Vyrobeno s ❤️ pro skvělé tvoření", footerProjects: "Domů na VinMat.eu",
                footerPrivacy: "Zásady ochrany osobních údajů", footerTerms: "Podmínky užití",
                footerDisclaimer: "Všechna stahování jsou zdarma pro osobní a vzdělávací účely",
                onlyBw: "◧ Černobílé", scrollTop: "⬆️ NAHORU", searchPlaceholder: "Hledat podle názvu..."
            },
            en: {
                mainTitle: "VINMAT'S WORLD FOR KIDS", subTitle: "Verified mazes, coloring pages and dot-to-dots for instant fun",
                vse: "All", bludiste: "Mazes", omalovanky: "Coloring", spojovacky: "Dot-to-Dots", ageTitle: "Age:",
                noResults: "Nothing found for this selection.", variant: "Select list variant",
                btnPng: "Download Image", btnPrint: "Print Directly", btnColor: "🌈 Colored", btnBw: "🪙 B&W", btnPartly: "🌗 Partly Colored",
                labelColor: "Colored", labelBw: "B&W", labelPartly: "Partly",
                bludisteLabel: "MAZES", omalovankyLabel: "COLORING", spojovackyLabel: "DOT-TO-DOTS",
                footerCopyright: "© 2026 Made with ❤️ for great crafting", footerProjects: "Home to VinMat.eu",
                footerPrivacy: "Privacy Policy", footerTerms: "Terms of Service",
                footerDisclaimer: "All downloads free for personal & educational use",
                onlyBw: "◧ B&W only", scrollTop: "⬆️ TOP", searchPlaceholder: "Search by name..."
            }
        };

        const vekMapovani = {
            'LV1': { cz: '👶 3–4', en: '👶 3–4' },
            'LV2': { cz: '👧👦 5–6', en: '👧👦 5–6' },
            'LV3': { cz: '👧👦 7–9', en: '👧👦 7–9' },
            'LV4': { cz: '👩‍🦰🧑‍🦱 10+', en: '👩‍🦰🧑‍🦱 10+' },
            'LV5': { cz: '👩👨 Expert', en: '👩👨 Expert' }
        };

        let jaz = 'cz';
        let aktualniTyp = 'vse'; let aktualniVek = 'vse';
        let aktivniKartyVerze = {}; let aktivniModalPolozka = null; let aktivniModalVerze = 'coloring';
        let zparsovanaData = [];

        // Pomocná funkce pro parsování CSV řádku s ohledem na uvozovky v textu
        function rozsekajCsvRadek(text) {
            let vysledek = [];
            let uvnitrUvozovek = false;
            let aktualniBunka = '';
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                if (c === '"') {
                    uvnitrUvozovek = !uvnitrUvozovek;
                } else if (c === ',' && !uvnitrUvozovek) {
                    vysledek.push(aktualniBunka.trim());
                    aktualniBunka = '';
                } else {
                    aktualniBunka += c;
                }
            }
            vysledek.push(aktualniBunka.trim());
            return vysledek;
        }

        // Načte CSV data z assets/data/ složky
        async function nactiCsvData(typAktivity) {
            try {
                const response = await fetch(`assets/data/${typAktivity}.csv`);
                if (!response.ok) return [];
                const text = await response.text();
                const radky = text.split(/\r?\n/);
                if (radky.length <= 1) return [];

                const zahlavi = rozsekajCsvRadek(radky[0]);
                const data = [];

                for (let i = 1; i < radky.length; i++) {
                    if (!radky[i].trim()) continue;
                    const bunky = rozsekajCsvRadek(radky[i]);
                    const radekObjekt = {};
                    zahlavi.forEach((klic, index) => {
                        radekObjekt[klic] = bunky[index] || '';
                    });
                    
                    if (!radekObjekt.soubor) continue;

                    // Extrakce věku ze souboru (např: lv1_gem_1006 -> LV1)
                    const vekKod = radekObjekt.soubor.split('_')[0].toUpperCase();

                    // Určení dostupných variant podle vyplněných ALTů (ignoruje "0" nebo prázdné)
                    const dostupneVarianty = [];
                    if (radekObjekt.altCz_colored && radekObjekt.altCz_colored !== '0') dostupneVarianty.push('colored');
                    if (radekObjekt.altCz_coloring && radekObjekt.altCz_coloring !== '0') dostupneVarianty.push('coloring');
                    if (radekObjekt.altCz_partly_colored && radekObjekt.altCz_partly_colored !== '0') dostupneVarianty.push('partly_colored');

                    // Výchozí verze karty (colored pokud je, jinak coloring)
                    const vychoziVarianta = dostupneVarianty.includes('colored') ? 'colored' : dostupneVarianty[0] || 'coloring';

                    data.push({
                        id: `${typAktivity}-${radekObjekt.soubor}`,
                        souborZáklad: radekObjekt.soubor,
                        typ: typAktivity,
                        vek: vekKod,
                        kategorie: radekObjekt.kategorie,
                        podkategorie: radekObjekt.podkategorie,
                        sezona: radekObjekt.sezona,
                        zamereni: radekObjekt.zamereni,
                        nazevCz: radekObjekt.nazevCz,
                        nazevEn: radekObjekt.nazevEn,
                        varianty: dostupneVarianty,
                        vychozi: vychoziVarianta,
                        alty: {
                            colored: { cz: radekObjekt.altCz_colored, en: radekObjekt.altEn_colored },
                            coloring: { cz: radekObjekt.altCz_coloring, en: radekObjekt.altEn_coloring },
                            partly_colored: { cz: radekObjekt.altCz_partly_colored, en: radekObjekt.altEn_partly_colored }
                        }
                    });
                }
                return data;
            } catch (e) {
                console.error(`Chyba při načítání ${typAktivity}.csv:`, e);
                return [];
            }
        }

        async function inicializujAplikaci() {
            const bludiste = await nactiCsvData('bludiste');
            const omalovanky = await nactiCsvData('omalovanky');
            const spojovacky = await nactiCsvData('spojovacky');
            
            zparsovanaData = [...bludiste, ...omalovanky, ...spojovacky];

            const ulozenyJazyk = localStorage.getItem('vinmat_main_lang') || localStorage.getItem('vinmat_lang');
            if (ulozenyJazyk) { jaz = ulozenyJazyk; }
            setJazyk(jaz);
        }

        function ziskejCestuBase(polozka, varianta) {
            // Sestavení cesty: public/bludiste/lv1_gem_1006-ant-maze-colored
            return `public/${polozka.typ}/${polozka.souborZáklad}-${varianta}`;
        }

        const grid = document.getElementById('knihovna-grid');
        const noResults = document.getElementById('no-results');

        async function nejlepsiUrl(cestaBase) {
            var webp = cestaBase + '.webp';
            var png = cestaBase + '.png';
            try {
                var r = await fetch(webp, { method: 'HEAD' });
                if (r.ok) return webp;
            } catch(e) {}
            return png;
        }

        function obrazekHTML(cestaBase, alt, cssClass, idAttr) {
            var idStr = idAttr ? ' id="' + idAttr + '"' : '';
            return '<picture class="max-w-full max-h-full flex items-center justify-center">'
                + '<source srcset="' + cestaBase + '.webp" type="image/webp">'
                + '<img' + idStr + ' src="' + cestaBase + '.png" alt="' + alt + '" class="' + cssClass + '"'
                + ' onerror="this.parentElement.querySelector(\'source\').remove(); this.src=\'' + cestaBase + '.png\'">'
                + '</picture>';
        }

        function setJazyk(novyJazyk) {
            jaz = novyJazyk;
            localStorage.setItem('vinmat_lang', jaz);
            document.getElementById('lang-to-en').classList.toggle('hidden', jaz === 'en');
            document.getElementById('lang-to-cz').classList.toggle('hidden', jaz === 'cz');
            document.getElementById('btn-scroll-top').innerText = slovnik[jaz].scrollTop;
            document.getElementById('search-input').placeholder = slovnik[jaz].searchPlaceholder;
            document.getElementById('txt-main-title').innerHTML = generujBarevnyText(slovnik[jaz].mainTitle);
            document.getElementById('txt-sub-title').innerText = slovnik[jaz].subTitle;
            document.getElementById('btn-vse').innerText = slovnik[jaz].vse;
            document.getElementById('lbl-nav-bludiste').innerText = slovnik[jaz].bludiste;
            document.getElementById('lbl-nav-omalovanky').innerText = slovnik[jaz].omalovanky;
            document.getElementById('lbl-nav-spojovacky').innerText = slovnik[jaz].spojovacky;
            document.getElementById('lbl-filter-age-title').innerText = slovnik[jaz].ageTitle;
            document.getElementById('btn-vek-vse').innerText = slovnik[jaz].vse;
            document.getElementById('txt-no-results').innerText = slovnik[jaz].noResults;
            document.getElementById('lbl-modal-variant').innerText = slovnik[jaz].variant;
            document.getElementById('modal-download-png').innerText = slovnik[jaz].btnPng;
            document.getElementById('print-btn').innerText = slovnik[jaz].btnPrint;
            document.getElementById('txt-footer-copyright').innerText = slovnik[jaz].footerCopyright;
            document.getElementById('txt-footer-projects').innerText = slovnik[jaz].footerProjects;
            document.getElementById('txt-footer-privacy').innerText = slovnik[jaz].footerPrivacy;
            document.getElementById('txt-footer-terms').innerText = slovnik[jaz].footerTerms;
            document.getElementById('txt-footer-disclaimer').innerText = slovnik[jaz].footerDisclaimer;
            document.getElementById('txt-footer-privacy').href = jaz === 'cz' ? 'privacy-cz.html' : 'privacy.html';
            document.getElementById('txt-footer-terms').href = jaz === 'cz' ? 'terms-cz.html' : 'terms.html';

            var aboutSection = document.getElementById('about-section');
            if (aboutSection) {
                if (jaz === 'cz') {
                    aboutSection.innerHTML = '<h2 class="text-lg font-bold text-slate-900 mb-3">O projektu VinMatův svět pro děti</h2><p class="mb-3">Vítejte v naší vybrané knihovně vysoce kvalitních pracovních listů určených pro rodiče, pedagogy a pečovatele. Tato platforma poskytuje bezplatný přístup ke vzdělávacím nástrojům strukturovaným do jasných úrovní obtížnosti, což vám pomůže najít perfektní aktivitu pro podporu kognitivního růstu, jemné motoriky a prostorového vnímání dětí.</p><div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4 pt-4 border-t border-slate-50"><div><h3 class="font-bold text-slate-800 mb-1">🧩 Ilustrovaná bludiště</h3><p class="text-xs">Skvělá pro procvičování řešení problémů, vytrvalosti a logického plánování. K dispozici v živých barvách i v černobílých variantách šetrných k tisku.</p></div><div><h3 class="font-bold text-slate-800 mb-1">🎨 Kreativní omalovánky</h3><p class="text-xs">Ideální pro umělecké vyjádření, rozpoznávání barev a posilování svalů rukou, které jsou nezbytné pro časné dovednosti psaní.</p></div><div><h3 class="font-bold text-slate-800 mb-1">🔢 Zábavné spojovačky</h3><p class="text-xs">Poutavé skládačky, které skrytě trénují řazení čísel, koncentraci a přesné kreslení čar.</p></div></div>';
                } else {
                    aboutSection.innerHTML = '<h2 class="text-lg font-bold text-slate-900 mb-3">About VinMat\'s World for Kids</h2><p class="mb-3">Welcome to our curated library of high-quality worksheets designed for parents, educators, and guardians. This platform provides free access to educational tools structured into clear difficulty levels, helping you find the perfect activity to support children\'s cognitive growth, fine motor skills, and spatial awareness.</p><div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4 pt-4 border-t border-slate-50"><div><h3 class="font-bold text-slate-800 mb-1">🧩 Illustrated Mazes</h3><p class="text-xs">Great for practicing problem-solving, persistence, and logical planning. Available in both vibrant colors and printer-friendly variants.</p></div><div><h3 class="font-bold text-slate-800 mb-1">🎨 Creative Coloring</h3><p class="text-xs">Perfect for artistic expression, color recognition, and strengthening hand muscles essential for early writing skills.</p></div><div><h3 class="font-bold text-slate-800 mb-1">🔢 Dot-to-Dot Sheets</h3><p class="text-xs">Engaging puzzle layouts that secretly train number sequencing, concentration, and precise line drawing precision.</p></div></div>';
                }
            }
            filtrujData();
        }

        function generujBarevnyText(text) {
            var vysledek = ''; var bIdx = 0;
            for (var i = 0; i < text.length; i++) {
                if (text[i] === ' ') { vysledek += '<span class="inline-block">&nbsp;</span>'; }
                else { vysledek += '<span class="outline-text char-' + (bIdx % 8) + '">' + text[i] + '</span>'; bIdx++; }
            }
            return vysledek;
        }

        function setTyp(typ) {
            aktualniTyp = typ;
            ['vse', 'bludiste', 'omalovanky', 'spojovacky'].forEach(function(t) {
                document.getElementById('btn-' + t).className = t === typ
                    ? "px-5 py-2 rounded-full text-sm font-bold bg-slate-900 text-white shadow-sm"
                    : "px-5 py-2 rounded-full text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200";
            });
            filtrujData();
        }

        function setVek(vek) {
            aktualniVek = vek;
            var veky = { 'vse': 'btn-vek-vse', 'LV1': 'btn-vek-1', 'LV2': 'btn-vek-2', 'LV3': 'btn-vek-3', 'LV4': 'btn-vek-4', 'LV5': 'btn-vek-5' };
            Object.keys(veky).forEach(function(v) {
                document.getElementById(veky[v]).className = v === vek
                    ? "px-4 py-1.5 text-xs font-bold rounded-full bg-slate-900 text-white"
                    : "px-4 py-1.5 text-xs font-bold rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200";
            });
            filtrujData();
        }

        function setKartaVerze(id, verze) {
            var polozka = zparsovanaData.find(function(p) { return p.id === id; });
            if (!polozka) return;
            aktivniKartyVerze[id] = verze;
            var container = document.getElementById('container-img-' + id);
            if (!container) return;
            
            var cestaBase = ziskejCestuBase(polozka, verze);
            var altText = polozka.alty[verze][jaz] || polozka[`nazev${jaz === 'cz' ? 'Cz' : 'En'}`];
            
            container.innerHTML = obrazekHTML(cestaBase, altText, 'max-w-full max-h-full object-contain group-hover:scale-102 transition-transform duration-300', '');
            
            // Přepínání aktivního stylu u mini tlačítek na kartě
            polozka.varianty.forEach(v => {
                var btn = document.getElementById(`btn-${v}-${id}`);
                if (btn) {
                    btn.className = v === verze
                        ? "flex-1 py-1 text-[11px] font-bold rounded-md bg-slate-900 text-white"
                        : "flex-1 py-1 text-[11px] font-bold rounded-md text-slate-500 hover:bg-slate-200";
                }
            });
        }

        function vykresliKnihovnu(materialy) {
            grid.innerHTML = "";
            if (materialy.length === 0) { noResults.classList.remove('hidden'); return; }
            noResults.classList.add('hidden');

            materialy.forEach(function(polozka) {
                if (!aktivniKartyVerze[polozka.id]) aktivniKartyVerze[polozka.id] = polozka.vychozi;
                var aktualniVerze = aktivniKartyVerze[polozka.id];
                
                var cestaBase = ziskejCestuBase(polozka, aktualniVerze);
                var vekText = vekMapovani[polozka.vek] ? vekMapovani[polozka.vek][jaz] : polozka.vek;
                var zobrazenyNazev = jaz === 'cz' ? polozka.nazevCz : polozka.nazevEn;
                var altText = polozka.alty[aktualniVerze][jaz] || zobrazenyNazev;

                var tlacitkaHTML = "";
                if (polozka.varianty.length > 1) {
                    tlacitkaHTML = '<div class="flex gap-1 bg-slate-100 p-0.5 rounded-lg">';
                    polozka.varianty.forEach(v => {
                        var labelKlice = { colored: 'labelColor', coloring: 'labelColoring', partly_colored: 'labelPartly' };
                        var textTlacitka = slovnik[jaz][labelKlice[v] || 'labelBw'] || v;
                        tlacitkaHTML += `<button id="btn-${v}-${polozka.id}" onclick="setKartaVerze('${polozka.id}', '${v}')" class="flex-1 py-1 text-[11px] rounded-md">${textTlacitka}</button>`;
                    });
                    tlacitkaHTML += '</div>';
                } else {
                    tlacitkaHTML = '<div class="text-center bg-slate-100 py-1 rounded-lg text-[11px] font-bold text-slate-500">' + slovnik[jaz].onlyBw + '</div>';
                }

                var karta = document.createElement('div');
                karta.className = "bg-white rounded-2xl overflow-hidden shadow-xs hover:shadow-md transition-all border border-slate-100 flex flex-col";
                karta.innerHTML = '<div id="container-img-' + polozka.id + '" onclick="openModal(\'' + polozka.id + '\')" class="bg-slate-50 aspect-[4/5] p-4 flex items-center justify-center cursor-pointer group">'
                    + obrazekHTML(cestaBase, altText, 'max-w-full max-h-full object-contain group-hover:scale-102 transition-transform duration-300', '')
                    + '</div>'
                    + '<div class="p-4 flex-grow flex flex-col justify-between border-t border-slate-50">'
                    + '<div class="mb-3">'
                    + '<div class="flex justify-between items-center mb-1">'
                    + '<span class="text-[10px] font-bold tracking-wider text-slate-400 uppercase">' + slovnik[jaz][polozka.typ + 'Label'] + '</span>'
                    + '<span class="text-xs text-slate-400 font-bold">' + vekText + '</span>'
                    + '</div>'
                    + '<h3 onclick="openModal(\'' + polozka.id + '\')" class="font-bold text-sm text-slate-900 leading-tight cursor-pointer hover:text-indigo-600 line-clamp-2 uppercase">' + zobrazenyNazev + '</h3>'
                    + '</div>' + tlacitkaHTML + '</div>';
                grid.appendChild(karta);
                setKartaVerze(polozka.id, aktualniVerze);
            });
        }

        function filtrujData() {
            var hledanyText = document.getElementById('search-input').value.toLowerCase().trim();
            var vyfiltrovano = zparsovanaData.filter(function(polozka) {
                var odpovidaTyp = (aktualniTyp === 'vse' || polozka.typ === aktualniTyp);
                var odpovidaVek = (aktualniVek === 'vse' || polozka.vek === aktualniVek);
                var czNazev = polozka.nazevCz.toLowerCase();
                var enNazev = polozka.nazevEn.toLowerCase();
                var odpovidaVyhledavani = (hledanyText === '' || czNazev.includes(hledanyText) || enNazev.includes(hledanyText));
                return odpovidaTyp && odpovidaVek && odpovidaVyhledavani;
            });
            grid.innerHTML = "";
            vykresliKnihovnu(vyfiltrovano);
            
            if (jaz === 'cz') {
                if (aktualniTyp === 'bludiste') { document.title = "Dětská bludiště a labyrinty k vytisknutí"; }
                else if (aktualniTyp === 'omalovanky') { document.title = "Omalovánky a vybarvovánky pro děti k vytisknutí"; }
                else if (aktualniTyp === 'spojovacky') { document.title = "Spojovačky a kreslení podle čísel k vytisknutí"; }
                else { document.title = "VinMat | Bludiště, omalovánky a další aktivity k vytisknutí"; }
            } else {
                if (aktualniTyp === 'bludiste') { document.title = "Free Printable Mazes and Labyrinths for Kids"; }
                else if (aktualniTyp === 'omalovanky') { document.title = "Free Printable Coloring Pages for Kids"; }
                else if (aktualniTyp === 'spojovacky') { document.title = "Free Printable Dot-to-Dot Worksheets for Kids"; }
                else { document.title = "VinMat | Free Printable Mazes, Coloring Pages & More Activities"; }
            }
        }

        function openModal(id) {
            var polozka = zparsovanaData.find(function(p) { return p.id === id; });
            if (!polozka) return;
            aktivniModalPolozka = polozka;
            aktivniModalVerze = aktivniKartyVerze[id] || polozka.vychozi;
            
            document.getElementById('modal-title').innerText = jaz === 'cz' ? polozka.nazevCz : polozka.nazevEn;
            var vekText = vekMapovani[polozka.vek] ? vekMapovani[polozka.vek][jaz] : polozka.vek;
            document.getElementById('modal-tag-vek').innerText = vekText.toUpperCase();
            
            var containerVerze = document.getElementById('modal-version-container');
            var btnGroup = document.getElementById('modal-buttons-group');
            btnGroup.innerHTML = '';

            // Pokud má prvek více variant, vyrobíme velké přepínače v modalu
            if (polozka.varianty.length > 1) {
                containerVerze.classList.remove('hidden');
                polozka.varianty.forEach(v => {
                    var slovnikKlice = { colored: 'btnColor', coloring: 'btnBw', partly_colored: 'btnPartly' };
                    var textBtn = slovnik[jaz][slovnikKlice[v]] || v;
                    btnGroup.innerHTML += `<button id="modal-btn-${v}" onclick="toggleModalVersion('${v}')" class="flex-1 py-2 px-4 rounded-xl font-bold text-sm border-2">${textBtn}</button>`;
                });
            } else {
                containerVerze.classList.add('hidden');
            }

            document.getElementById('modal-download-png').onclick = async function() {
                var cestaBase = ziskejCestuBase(polozka, aktivniModalVerze);
                var btn = document.getElementById('modal-download-png');
                var puvodniText = btn.innerText;
                btn.innerText = '⏳ Připravuji...';
                var url = await nejlepsiUrl(cestaBase);
                var pripona = url.split('.').pop();
                var link = document.createElement('a');
                link.href = url;
                link.download = polozka.souborZáklad + '_' + aktivniModalVerze + '.' + pripona;
                link.click();
                btn.innerText = puvodniText;
            };

            updateModalDisplay();
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }

        function toggleModalVersion(verze) {
            if (!aktivniModalPolozka) return;
            aktivniModalVerze = verze;
            updateModalDisplay();
            setKartaVerze(aktivniModalPolozka.id, verze);
        }

        function updateModalDisplay() {
            if (!aktivniModalPolozka) return;
            var cestaBase = ziskejCestuBase(aktivniModalPolozka, aktivniModalVerze);
            var mContainer = document.getElementById('modal-img-container');
            var altText = aktivniModalPolozka.alty[aktivniModalVerze][jaz] || (jaz === 'cz' ? aktivniModalPolozka.nazevCz : aktivniModalPolozka.nazevEn);
            
            mContainer.innerHTML = obrazekHTML(cestaBase, altText, 'max-w-full max-h-full object-contain rounded-lg', 'aktualni-nahled-obrazku');

            // Aktivace správného tlačítka v modalu
            aktivniModalPolozka.varianty.forEach(v => {
                var btn = document.getElementById(`modal-btn-${v}`);
                if (btn) {
                    btn.className = v === aktivniModalVerze
                        ? "flex-1 py-2 px-4 rounded-xl font-bold text-sm bg-slate-900 text-white border-slate-900"
                        : "flex-1 py-2 px-4 rounded-xl font-bold text-sm bg-slate-50 border border-slate-200 text-slate-600";
                }
            });
        }

        async function tiskniAktualni() {
            if (!aktivniModalPolozka) return;
            var btn = document.getElementById('print-btn');
            var puvodniText = btn.innerText;
            btn.innerText = '⏳ Připravuji tisk...';
            var cestaBase = ziskejCestuBase(aktivniModalPolozka, aktivniModalVerze);
            
            var pngUrl = cestaBase + '.png';
            var tiskUrl = pngUrl;
            try {
                var r = await fetch(pngUrl, { method: 'HEAD' });
                if (!r.ok) { tiskUrl = cestaBase + '.webp'; }
            } catch(e) {}
            var tiskoveOkno = window.open('', '_blank');
            tiskoveOkno.document.write('<html><body style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh;"><img src="' + tiskUrl + '" style="max-width:100%;max-height:100%;object-fit:contain;" onload="window.print();window.close();"></body></html>');
            tiskoveOkno.document.close();
            btn.innerText = puvodniText;
        }

        function closeModalOnBackdrop(event) {
            if (event.target === document.getElementById('detail-modal')) { closeModal(); }
        }

        // Spuštění kompletní asynchronní aplikace
        inicializujAplikaci();
    </script>
    <script data-goatcounter="https://worldforkids.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
