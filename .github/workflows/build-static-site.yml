name: Build static localized site

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/static-localization-adsense
    paths:
      - 'assets/data/**'
      - 'assets/js/site-config.js'
      - 'assets/js/site-navigation.js'
      - 'scripts/build-static-site.mjs'
      - 'index.html'
      - '*.html'
      - 'package.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate static pages and sitemap
        run: npm run build:static

      - name: Commit generated site files
        run: |
          if git diff --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html cs sitemap.xml activities assets/js scripts .github/workflows package.json
          git commit -m "build: generate localized static pages"
          git push
